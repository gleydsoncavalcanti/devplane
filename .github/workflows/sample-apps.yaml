name: sample-apps

on:
  push:
    branches:
      - main
    paths:
      - "examples/services/**"
      - ".github/workflows/sample-apps.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - produtos
          - contabilidade
          - logistica
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: examples/services/${{ matrix.app }}
          push: true
          tags: ghcr.io/${{ github.repository }}/sample-${{ matrix.app }}:latest
