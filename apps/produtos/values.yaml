devplane-application:
  app:
    name: produtos
    domain: produtos.localhost
    replicaCount: 1

  image:
    repository: ghcr.io/gleydsoncavalcanti/devplane/sample-produtos
    tag: latest

  postgres:
    enabled: true
    database: produtos
    username: produtos
    password: produtos

  observability:
    enabled: true
    logs:
      enabled: true
    metrics:
      enabled: true
    traces:
      enabled: true
    datastore:
      logs: loki
      metrics: mimir
      traces: tempo
