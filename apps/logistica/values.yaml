devplane-application:
  app:
    name: logistica
    domain: logistica.devplane
    replicaCount: 1

  image:
    repository: ghcr.io/gleydsoncavalcanti/devplane/sample-logistica
    tag: latest

  postgres:
    enabled: true
    database: logistica
    username: logistica
    password: logistica

  observability:
    enabled: true
    logs:
      enabled: true
    metrics:
      enabled: false
    traces:
      enabled: true
    datastore:
      logs: loki
      metrics: mimir
      traces: tempo
