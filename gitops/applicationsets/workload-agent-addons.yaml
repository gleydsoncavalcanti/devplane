apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-agent-addons
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  devplane.io/workload: "true"
          - list:
              elements:
                - chart: opentelemetry-collector
                - chart: vector
  template:
    metadata:
      name: '{{name}}-{{chart}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/gleydsoncavalcanti/devplane.git
        targetRevision: main
        path: charts/agents/{{chart}}
        helm:
          releaseName: '{{chart}}'
      destination:
        server: '{{server}}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
