apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devplane-portal.fullname" . }}
  namespace: portal
  labels:
    {{- include "devplane-portal.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>DevPlane Portal</title>
        <style>
          :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f7faf9;
            color: #143236;
          }
          body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
          }
          main {
            width: min(920px, calc(100vw - 48px));
          }
          h1 {
            margin: 0 0 14px;
            font-size: clamp(42px, 8vw, 88px);
            line-height: 0.94;
            letter-spacing: 0;
          }
          p {
            max-width: 680px;
            margin: 0;
            color: #486166;
            font-size: 20px;
            line-height: 1.6;
          }
          .meta {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 28px;
            color: #25636a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 13px;
          }
          .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #54a383;
          }
        </style>
      </head>
      <body>
        <main>
          <div class="meta"><span class="dot"></span> DevPlane Platform</div>
          <h1>Developer portal is online.</h1>
          <p>
            This is the packaged DevPlane portal surface. Application onboarding
            and runtime workflows will be added in the next iteration.
          </p>
        </main>
      </body>
    </html>
