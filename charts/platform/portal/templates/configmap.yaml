apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devplane-portal.fullname" . }}
  namespace: portal
  labels:
    {{- include "devplane-portal.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>DevPlane Portal</title>
        <style>
          :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f7faf9;
            color: #143236;
          }
          body {
            margin: 0;
            min-height: 100vh;
            padding: 56px 0;
          }
          main {
            width: min(920px, calc(100vw - 48px));
            margin: 0 auto;
          }
          h1 {
            margin: 0 0 14px;
            font-size: clamp(42px, 8vw, 88px);
            line-height: 0.94;
            letter-spacing: 0;
          }
          p {
            max-width: 680px;
            margin: 0;
            color: #486166;
            font-size: 20px;
            line-height: 1.6;
          }
          .meta {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 28px;
            color: #25636a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 13px;
          }
          .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #54a383;
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 40px;
          }
          .card {
            border: 1px solid #bfd7d2;
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
          }
          .card h2 {
            margin: 0 0 10px;
            font-size: 22px;
          }
          .card ul {
            margin: 0;
            padding-left: 18px;
            color: #486166;
            line-height: 1.7;
          }
          .options {
            margin-top: 28px;
            padding: 20px;
            border-radius: 8px;
            background: #e7f5ef;
            color: #244a4f;
          }
          .options strong {
            display: block;
            margin-bottom: 10px;
          }
          @media (max-width: 760px) {
            .grid {
              grid-template-columns: 1fr;
            }
          }
        </style>
      </head>
      <body>
        <main>
          <div class="meta"><span class="dot"></span> DevPlane Platform</div>
          <h1>Developer portal is online.</h1>
          <p>
            Choose an application template, configure Postgres and observability,
            then generate an ArgoCD-managed rollout from the DevPlane application chart.
          </p>
          <section class="grid" aria-label="Application templates">
            <article class="card">
              <h2>Produtos</h2>
              <ul>
                <li>Postgres database</li>
                <li>Logs, metrics and traces</li>
                <li>Loki, Mimir and Tempo</li>
              </ul>
            </article>
            <article class="card">
              <h2>Contabilidade</h2>
              <ul>
                <li>Postgres database</li>
                <li>Logs and metrics</li>
                <li>Traces optional</li>
              </ul>
            </article>
            <article class="card">
              <h2>Logistica</h2>
              <ul>
                <li>Postgres database</li>
                <li>Logs and traces</li>
                <li>Metrics optional</li>
              </ul>
            </article>
          </section>
          <section class="options">
            <strong>Next portal action</strong>
            Generate a local app values file, select logs, metrics and traces,
            choose Loki, Mimir and Tempo as datastores, and let ArgoCD apply the
            packaged application chart.
          </section>
        </main>
      </body>
    </html>
