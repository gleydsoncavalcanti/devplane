apiVersion: v1
kind: Service
metadata:
  name: {{ include "devplane-portal.fullname" . }}
  namespace: portal
  labels:
    {{- include "devplane-portal.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "devplane-portal.selectorLabels" . | nindent 4 }}
