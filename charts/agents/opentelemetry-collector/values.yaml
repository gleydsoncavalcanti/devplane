opentelemetry-collector:
  mode: daemonset
  nodeSelector:
    devplane.io/node-pool: addons
  image:
    repository: otel/opentelemetry-collector-contrib
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi
  presets:
    logsCollection:
      enabled: true
    hostMetrics:
      enabled: true
    kubeletMetrics:
      enabled: true
  config:
    exporters:
      otlp/vector:
        endpoint: vector.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        logs:
          exporters:
            - otlp/vector
        metrics:
          exporters:
            - otlp/vector
        traces:
          exporters:
            - otlp/vector
