app:
  name: sample-app
  domain: sample.localhost
  replicaCount: 1

image:
  repository: ghcr.io/gleydsoncavalcanti/sample-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

ingress:
  enabled: true
  className: nginx
  path: /

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  database: app
  username: app
  password: app
  storage:
    enabled: false
    size: 1Gi

observability:
  enabled: true
  logs:
    enabled: true
  metrics:
    enabled: true
  traces:
    enabled: true
  datastore:
    logs: loki
    metrics: mimir
    traces: tempo

env: []

resources: {}
