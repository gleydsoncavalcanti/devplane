loki:
  deploymentMode: SingleBinary
  minio:
    enabled: true
    serviceAccount:
      name: loki-minio-sa
    nodeSelector:
      devplane.io/node-pool: addons
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    commonConfig:
      replication_factor: 1
    storage:
      type: s3
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      s3:
        endpoint: loki-minio.observability.svc.cluster.local:9000
        secretAccessKey: supersecret
        accessKeyId: minio
        s3ForcePathStyle: true
        insecure: true
  singleBinary:
    replicas: 1
    nodeSelector:
      devplane.io/node-pool: addons
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        memory: 512Mi
  gateway:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi
  lokiCanary:
    enabled: false
  test:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
