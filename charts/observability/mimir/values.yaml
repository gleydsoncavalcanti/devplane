    enabled: true
  gateway:
    enabledNonEnterprise: true
    nodeSelector:
      devplane.io/node-group: observability
  nginx:
    nodeSelector:
      devplane.io/node-group: observability
  distributor:
    replicas: 1
    nodeSelector:
      devplane.io/node-group: observability
  ingester:
    replicas: 1
