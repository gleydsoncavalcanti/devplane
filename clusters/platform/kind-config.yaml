kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devplane
nodes:
  - role: control-plane
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    labels:
      devplane.io/node-pool: addons
  - role: worker
    labels:
      devplane.io/node-pool: addons
